# 監視対象の宣言ファイル
# Claude Code から触るのは基本的にここだけ。

# ランキング取得対象の楽天ジャンルID
# ★ 親カテゴリIDを書けばサブカテゴリを自動展開して全て取得する
# 例:
#   100944  … スキンケア全体（下の全サブカテゴリを自動展開）
#   216348  … 美容液のみ（末端IDなので直接取得）
#   210450  … クレンジング全体（配下10種を自動展開）
genre_ids:
  - 100944

# キーワード検索の対象語
keywords:
  - スキンケア
  - 美容液

# 類似候補抽出の基準商品(複数可)
# id は楽天 itemCode を直接書ける場合は書く。なくても name/price/genre_id があれば動く。
reference_items:
  - id: null
    name: "サンプル美容液 30ml"
    price: 3000
    genre_id: 216348
