# 監視対象の宣言ファイル
# Claude Code から触るのは基本的にここだけ。

# ランキング取得対象の楽天ジャンルID
# ★ 親カテゴリIDを書けばサブカテゴリを自動展開して全て取得する
# 例:
#   100944  … スキンケア全体（下の全サブカテゴリを自動展開）
#   216348  … 美容液のみ（末端IDなので直接取得）
#   210450  … クレンジング全体（配下10種を自動展開）
genre_ids:
  - 100944

# キーワード検索の対象語
keywords:
  - スキンケア
  - 美容液

# 類似候補抽出の基準商品(複数可)
# id は楽天 itemCode を直接書ける場合は書く。なくても name/price/genre_id があれば動く。
reference_items:
  - id: null
    name: "サンプル美容液 30ml"
    price: 3000
    genre_id: 216348

# ブランド類似検索の対象（複数可）
# name: ブランド名（必須）
# category: カテゴリ名または商品名のヒント（任意・省略可、検索精度が上がる）
# ★ ブランド商品をまず検索し、その価格帯・ジャンル・キーワードを分析して類似商品を自動抽出する
brand_queries:
  - name: "SK-II"
    category: "美容液"
  - name: "ドクターシーラボ"
    category: ""
  - name: "ma:nyo"
    category: "美容液"
    sort: "-reviewCount"      # レビュー数が多い順（人気順の近似）
    top_as_reference: 3       # 上位N件を基準商品として類似検索にも使う
